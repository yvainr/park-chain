name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check repository scaffold
        run: |
          test -d contracts/src
          test -d contracts/hardhat-test
          test -d frontend/src
          test -d docs

      - name: Install Node dependencies
        run: npm install

      - name: Build contracts
        id: hardhat_build
        run: npm run build:contracts

      - name: Run Hardhat contract tests
        id: hardhat_tests
        run: npm run test:contracts

      - name: Download previous gas usage table
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'ci.yml';
            const branch = context.payload.pull_request?.base?.ref ?? context.ref.replace('refs/heads/', '');

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              status: 'success',
              per_page: 10,
            });

            const previousRun = runs.workflow_runs.find((run) => run.id !== context.runId);
            if (!previousRun) {
              core.info(`No previous successful CI run found on ${branch}.`);
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: previousRun.id,
            });

            const artifact = artifacts.artifacts.find((item) => item.name === 'gas-usage-table');
            if (!artifact) {
              core.info(`Previous CI run ${previousRun.id} has no gas-usage-table artifact.`);
              return;
            }

            const response = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });

            fs.writeFileSync('previous-gas-usage-table.zip', Buffer.from(response.data));
            core.info(`Downloaded gas-usage-table artifact from run ${previousRun.id}.`);

      - name: Extract previous gas usage table
        run: |
          if [ -f previous-gas-usage-table.zip ]; then
            unzip -p previous-gas-usage-table.zip gas-usage-table.md > previous-gas-usage-table.md || true
          fi

      - name: Generate gas usage table
        id: gas_usage_table
        run: |
          npm run gas:contracts
          cat gas-usage-table.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload gas usage table
        uses: actions/upload-artifact@v4
        with:
          name: gas-usage-table
          path: gas-usage-table.md

      - name: Build frontend
        id: frontend_build
        run: npm run frontend:build

      - name: Generate test summary
        if: always()
        run: |
          {
            echo "## Test Summary"
            echo
            echo "| Suite | Command | Result |"
            echo "|---|---|---|"
            echo "| Contract build | \`npm run build:contracts\` | \`${{ steps.hardhat_build.outcome }}\` |"
            echo "| Hardhat contract tests | \`npm run test:contracts\` | \`${{ steps.hardhat_tests.outcome }}\` |"
            echo "| Gas usage table | \`npm run gas:contracts\` | \`${{ steps.gas_usage_table.outcome }}\` |"
            echo "| Frontend build | \`npm run frontend:build\` | \`${{ steps.frontend_build.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
